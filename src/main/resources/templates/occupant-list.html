<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Occupants Management</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background-color: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            color: #333;
            margin-bottom: 10px;
            text-align: center;
            font-size: 36px;
            font-weight: 700;
        }
        .breadcrumb {
            text-align: center;
            margin-bottom: 30px;
            color: #666;
            font-size: 16px;
        }
        .breadcrumb a {
            color: #fa709a;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s;
        }
        .breadcrumb a:hover {
            color: #fee140;
        }
        .filter-section {
            margin-bottom: 30px;
            padding: 20px;
            background: linear-gradient(135deg, #fff9e6 0%, #ffe6f0 100%);
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(250, 112, 154, 0.2);
        }
        .filter-section label {
            font-weight: 600;
            color: #333;
            margin-right: 10px;
        }
        .filter-section select {
            padding: 10px 16px;
            border-radius: 8px;
            border: 2px solid #fa709a;
            font-size: 14px;
            margin-right: 10px;
        }
        .btn {
            display: inline-block;
            padding: 12px 24px;
            background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
            color: white;
            text-decoration: none;
            border-radius: 25px;
            font-weight: 600;
            transition: all 0.3s;
            border: none;
            cursor: pointer;
            font-size: 14px;
            box-shadow: 0 4px 15px rgba(250, 112, 154, 0.3);
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(250, 112, 154, 0.4);
        }
        .btn-danger {
            background: linear-gradient(135deg, #f85032 0%, #e73827 100%);
            box-shadow: 0 4px 15px rgba(220, 53, 69, 0.3);
        }
        .btn-danger:hover {
            box-shadow: 0 6px 20px rgba(220, 53, 69, 0.4);
        }
        .btn-warning {
            background: linear-gradient(135deg, #ffd89b 0%, #19547b 100%);
            box-shadow: 0 4px 15px rgba(255, 193, 7, 0.3);
        }
        .btn-warning:hover {
            box-shadow: 0 6px 20px rgba(255, 193, 7, 0.4);
        }
        .btn-secondary {
            background: linear-gradient(135deg, #6c757d 0%, #495057 100%);
            box-shadow: 0 4px 15px rgba(108, 117, 125, 0.3);
        }
        .btn-secondary:hover {
            box-shadow: 0 6px 20px rgba(108, 117, 125, 0.4);
        }
        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            margin-top: 20px;
            overflow: hidden;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
        }
        th, td {
            padding: 16px;
            text-align: left;
        }
        th {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 12px;
            letter-spacing: 1px;
        }
        tbody tr {
            background-color: white;
            transition: all 0.3s;
        }
        tbody tr:hover {
            background-color: #f8f9fa;
            transform: scale(1.01);
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        td {
            border-bottom: 1px solid #e9ecef;
        }
        .actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .no-data {
            text-align: center;
            padding: 60px 20px;
            color: #999;
            font-size: 18px;
        }
        .no-data::before {
            content: "👥";
            display: block;
            font-size: 64px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>👥 Occupants Management</h1>

    <div class="breadcrumb">
        <a href="/">🏠 Home</a> /
        <span th:if="${selectedUnit != null}" th:text="'Unit ' + ${selectedUnit.unitNumber}"></span>
        <span th:if="${selectedUnit == null}">All Occupants</span>
    </div>

    <div class="filter-section">
        <label>Filter by Unit:</label>
        <select onchange="window.location.href='/occupants?unitId=' + this.value">
            <option value="">All Units</option>
            <option th:each="unit : ${units}"
                    th:value="${unit.unitId}"
                    th:text="${unit.property.propertyName + ' - Unit ' + unit.unitNumber}"
                    th:selected="${selectedUnit != null && selectedUnit.unitId == unit.unitId}">
            </option>
        </select>
        <a href="/occupants" class="btn btn-secondary">Clear Filter</a>
    </div>

    <a th:href="@{/occupants/new(unitId=${selectedUnit != null ? selectedUnit.unitId : null})}"
       class="btn">+ Add New Occupant</a>

    <div th:if="${occupants.isEmpty()}" class="no-data">
        <p>No occupants found. Click "Add New Occupant" to create one.</p>
    </div>

    <table th:if="${!occupants.isEmpty()}">
        <thead>
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Unit</th>
            <th>Relationship</th>
            <th>Date of Birth</th>
            <th>Phone</th>
            <th>Email</th>
            <th>Vehicle</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="occupant : ${occupants}">
            <td th:text="${occupant.occupantId}"></td>
            <td th:text="${occupant.fullName}" style="font-weight: 600;"></td>
            <td th:text="${occupant.unitInfo}"></td>
            <td th:text="${occupant.relationshipToTenant}"></td>
            <td th:text="${occupant.dateOfBirth != null ? #dates.format(occupant.dateOfBirth, 'MM/dd/yyyy') : 'N/A'}"></td>
            <td th:text="${occupant.phone != null && !occupant.phone.isEmpty() ? occupant.phone : 'N/A'}"
                th:style="${occupant.phone == null || occupant.phone.isEmpty() ? 'color: #999;' : ''}"></td>
            <td th:text="${occupant.email != null && !occupant.email.isEmpty() ? occupant.email : 'N/A'}"
                th:style="${occupant.email == null || occupant.email.isEmpty() ? 'color: #999;' : ''}"></td>
            <td th:text="${occupant.vehicleInfo != null && !occupant.vehicleInfo.isEmpty() ? occupant.vehicleInfo : 'N/A'}"
                th:style="${occupant.vehicleInfo == null || occupant.vehicleInfo.isEmpty() ? 'color: #999;' : ''}"></td>
            <td class="actions">
                <a th:href="@{/occupants/edit/{id}(id=${occupant.occupantId})}"
                   class="btn btn-warning">Edit</a>
                <a th:href="@{/occupants/delete/{id}(id=${occupant.occupantId})}"
                   class="btn btn-danger"
                   onclick="return confirm('Are you sure you want to delete this occupant?')">Delete</a>
            </td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
