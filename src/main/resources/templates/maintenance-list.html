<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maintenance Requests</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #ff9a56 0%, #ff6a88 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background-color: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            color: #333;
            margin-bottom: 10px;
            text-align: center;
            font-size: 36px;
            font-weight: 700;
        }
        .breadcrumb {
            text-align: center;
            margin-bottom: 30px;
            color: #666;
            font-size: 16px;
        }
        .breadcrumb a {
            color: #ff6a88;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s;
        }
        .breadcrumb a:hover {
            color: #ff9a56;
        }
        .filter-section {
            margin-bottom: 30px;
            padding: 20px;
            background: linear-gradient(135deg, #ffe5ec 0%, #fff0f3 100%);
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(255, 106, 136, 0.2);
            display: flex;
            gap: 15px;
            align-items: center;
            flex-wrap: wrap;
        }
        .filter-section label {
            font-weight: 600;
            color: #333;
        }
        .filter-section select {
            padding: 10px 16px;
            border-radius: 8px;
            border: 2px solid #ff6a88;
            font-size: 14px;
        }
        .btn {
            display: inline-block;
            padding: 12px 24px;
            background: linear-gradient(135deg, #ff9a56 0%, #ff6a88 100%);
            color: white;
            text-decoration: none;
            border-radius: 25px;
            font-weight: 600;
            transition: all 0.3s;
            border: none;
            cursor: pointer;
            font-size: 14px;
            box-shadow: 0 4px 15px rgba(255, 106, 136, 0.3);
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 106, 136, 0.4);
        }
        .btn-danger {
            background: linear-gradient(135deg, #f85032 0%, #e73827 100%);
            box-shadow: 0 4px 15px rgba(220, 53, 69, 0.3);
        }
        .btn-danger:hover {
            box-shadow: 0 6px 20px rgba(220, 53, 69, 0.4);
        }
        .btn-warning {
            background: linear-gradient(135deg, #ffd89b 0%, #19547b 100%);
            box-shadow: 0 4px 15px rgba(255, 193, 7, 0.3);
        }
        .btn-warning:hover {
            box-shadow: 0 6px 20px rgba(255, 193, 7, 0.4);
        }
        .btn-secondary {
            background: linear-gradient(135deg, #6c757d 0%, #495057 100%);
            box-shadow: 0 4px 15px rgba(108, 117, 125, 0.3);
        }
        .btn-secondary:hover {
            box-shadow: 0 6px 20px rgba(108, 117, 125, 0.4);
        }
        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            margin-top: 20px;
            overflow: hidden;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
        }
        th, td {
            padding: 16px;
            text-align: left;
        }
        th {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 12px;
            letter-spacing: 1px;
        }
        tbody tr {
            background-color: white;
            transition: all 0.3s;
        }
        tbody tr:hover {
            background-color: #f8f9fa;
            transform: scale(1.01);
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        td {
            border-bottom: 1px solid #e9ecef;
        }
        .actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .no-data {
            text-align: center;
            padding: 60px 20px;
            color: #999;
            font-size: 18px;
        }
        .no-data::before {
            content: "🔧";
            display: block;
            font-size: 64px;
            margin-bottom: 20px;
        }
        .priority-badge {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
        }
        .priority-low {
            background-color: #d1ecf1;
            color: #0c5460;
        }
        .priority-medium {
            background-color: #fff3cd;
            color: #856404;
        }
        .priority-high {
            background-color: #f8d7da;
            color: #721c24;
        }
        .priority-urgent {
            background-color: #dc3545;
            color: white;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
        .status-badge {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
        }
        .status-open {
            background-color: #cce5ff;
            color: #004085;
        }
        .status-in_progress {
            background-color: #fff3cd;
            color: #856404;
        }
        .status-completed {
            background-color: #d4edda;
            color: #155724;
        }
        .status-cancelled {
            background-color: #d6d8db;
            color: #383d41;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>🔧 Maintenance Requests</h1>

    <div class="breadcrumb">
        <a href="/">🏠 Home</a> /
        <span>Maintenance</span>
    </div>

    <div class="filter-section">
        <div>
            <label>Filter by Status:</label>
            <select onchange="window.location.href='/maintenance?status=' + this.value">
                <option value="">All Statuses</option>
                <option th:each="stat : ${statuses}"
                        th:value="${stat}"
                        th:text="${stat}"
                        th:selected="${selectedStatus != null && selectedStatus == stat.name()}">
                </option>
            </select>
        </div>

        <div>
            <label>Filter by Priority:</label>
            <select onchange="window.location.href='/maintenance?priority=' + this.value">
                <option value="">All Priorities</option>
                <option th:each="pri : ${priorities}"
                        th:value="${pri}"
                        th:text="${pri}"
                        th:selected="${selectedPriority != null && selectedPriority == pri.name()}">
                </option>
            </select>
        </div>

        <a href="/maintenance" class="btn btn-secondary">Clear Filters</a>
        <a href="/maintenance/pending" class="btn btn-danger" style="margin-left: auto;">⚠️ Pending Only</a>
    </div>

    <a href="/maintenance/new" class="btn">+ New Maintenance Request</a>

    <div th:if="${requests.isEmpty()}" class="no-data">
        <p th:text="${pendingView != null ? 'No pending maintenance requests!' : 'No maintenance requests found.'}"></p>
    </div>

    <table th:if="${!requests.isEmpty()}">
        <thead>
        <tr>
            <th>ID</th>
            <th>Unit</th>
            <th>Title</th>
            <th>Priority</th>
            <th>Status</th>
            <th>Request Date</th>
            <th>Assigned To</th>
            <th>Est. Cost</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="request : ${requests}">
            <td th:text="${request.requestId}"></td>
            <td th:text="${request.unitInfo}"></td>
            <td th:text="${request.title}" style="font-weight: 600;"></td>
            <td th:switch="${request.priority.name()}">
                <span th:case="'LOW'" class="priority-badge priority-low" th:text="${request.priority}"></span>
                <span th:case="'MEDIUM'" class="priority-badge priority-medium" th:text="${request.priority}"></span>
                <span th:case="'HIGH'" class="priority-badge priority-high" th:text="${request.priority}"></span>
                <span th:case="'URGENT'" class="priority-badge priority-urgent" th:text="${request.priority}"></span>
            </td>
            <td th:switch="${request.status.name()}">
                <span th:case="'OPEN'" class="status-badge status-open" th:text="${request.status}"></span>
                <span th:case="'IN_PROGRESS'" class="status-badge status-in_progress" th:text="${request.status}"></span>
                <span th:case="'COMPLETED'" class="status-badge status-completed" th:text="${request.status}"></span>
                <span th:case="'CANCELLED'" class="status-badge status-cancelled" th:text="${request.status}"></span>
            </td>
            <td th:text="${#dates.format(request.requestDate, 'MM/dd/yyyy')}"></td>
            <td th:text="${request.assignedTo != null && !request.assignedTo.isEmpty() ? request.assignedTo : 'Unassigned'}"
                th:style="${request.assignedTo == null || request.assignedTo.isEmpty() ? 'color: #999; font-style: italic;' : ''}"></td>
            <td th:text="${request.estimatedCost != null ? '$' + #numbers.formatDecimal(request.estimatedCost, 1, 2) : 'N/A'}"
                th:style="${request.estimatedCost != null ? 'font-weight: 600; color: #28a745;' : 'color: #999;'}"></td>
            <td class="actions">
                <a th:href="@{/maintenance/edit/{id}(id=${request.requestId})}"
                   class="btn btn-warning">Edit</a>
                <a th:href="@{/maintenance/delete/{id}(id=${request.requestId})}"
                   class="btn btn-danger"
                   onclick="return confirm('Are you sure you want to delete this maintenance request?')">Delete</a>
            </td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
