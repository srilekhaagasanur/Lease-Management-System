<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tenant Form</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background-color: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            color: #333;
            margin-bottom: 30px;
            text-align: center;
            font-size: 32px;
            font-weight: 700;
        }
        .section-title {
            color: #38f9d7;
            font-size: 18px;
            margin-top: 30px;
            margin-bottom: 20px;
            padding-bottom: 8px;
            border-bottom: 3px solid #38f9d7;
            font-weight: 600;
        }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
            font-size: 14px;
        }
        .required {
            color: #38f9d7;
        }
        input, textarea {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        input:focus, textarea:focus {
            outline: none;
            border-color: #38f9d7;
            box-shadow: 0 0 0 3px rgba(56, 249, 215, 0.1);
        }
        textarea {
            resize: vertical;
            min-height: 80px;
        }
        .btn {
            display: inline-block;
            padding: 14px 32px;
            background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
            color: white;
            text-decoration: none;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            margin-right: 10px;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(67, 233, 123, 0.3);
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(67, 233, 123, 0.4);
        }
        .btn-secondary {
            background: linear-gradient(135deg, #6c757d 0%, #495057 100%);
            box-shadow: 0 4px 15px rgba(108, 117, 125, 0.3);
        }
        .btn-secondary:hover {
            box-shadow: 0 6px 20px rgba(108, 117, 125, 0.4);
        }
        .button-group {
            margin-top: 40px;
            text-align: center;
        }
        .helper-text {
            font-size: 12px;
            color: #666;
            margin-top: 3px;
        }
    </style>
</head>
<body>
<div class="container">
    <h1 th:text="${tenant.tenantId != null ? '✏️ Edit Tenant' : '➕ Add New Tenant'}"></h1>

    <form th:action="@{/tenants/save}" method="post">
        <input type="hidden" name="tenantId" th:value="${tenant.tenantId}" />

        <!-- Personal Information Section -->
        <div class="section-title">Personal Information</div>

        <div class="form-row">
            <div class="form-group">
                <label for="firstName">First Name <span class="required">*</span></label>
                <input type="text" id="firstName" name="firstName"
                       th:value="${tenant.firstName}" required />
            </div>

            <div class="form-group">
                <label for="lastName">Last Name <span class="required">*</span></label>
                <input type="text" id="lastName" name="lastName"
                       th:value="${tenant.lastName}" required />
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="email">Email <span class="required">*</span></label>
                <input type="email" id="email" name="email"
                       th:value="${tenant.email}" required />
            </div>

            <div class="form-group">
                <label for="dateOfBirth">Date of Birth <span class="required">*</span></label>
                <input type="date" id="dateOfBirth" name="dateOfBirth"
                       th:value="${tenant.dateOfBirth != null ? #dates.format(tenant.dateOfBirth, 'yyyy-MM-dd') : ''}"
                       required />
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="phone">Primary Phone <span class="required">*</span></label>
                <input type="tel" id="phone" name="phone"
                       th:value="${tenant.phone}"
                       placeholder="e.g., 6175551234" required />
                <span class="helper-text">Numbers only, no spaces or dashes</span>
            </div>

            <div class="form-group">
                <label for="phone2">Secondary Phone</label>
                <input type="tel" id="phone2" name="phone2"
                       th:value="${tenant.phone2}"
                       placeholder="Optional" />
            </div>
        </div>

        <!-- Identification Section -->
        <div class="section-title">Identification</div>

        <div class="form-row">
            <div class="form-group">
                <label for="ssnLastFour">SSN Last 4 Digits</label>
                <input type="text" id="ssnLastFour" name="ssnLastFour"
                       th:value="${tenant.ssnLastFour}"
                       maxlength="4" placeholder="1234" />
            </div>

            <div class="form-group">
                <label for="driversLicense">Driver's License</label>
                <input type="text" id="driversLicense" name="driversLicense"
                       th:value="${tenant.driversLicense}" />
            </div>
        </div>

        <div class="form-group">
            <label for="vehicleInfo">Vehicle Information</label>
            <input type="text" id="vehicleInfo" name="vehicleInfo"
                   th:value="${tenant.vehicleInfo}"
                   placeholder="e.g., 2020 Honda Civic, Black, Plate: ABC123" />
        </div>

        <!-- Emergency Contact Section -->
        <div class="section-title">Emergency Contact</div>

        <div class="form-group">
            <label for="emergencyContactName">Contact Name</label>
            <input type="text" id="emergencyContactName" name="emergencyContactName"
                   th:value="${tenant.emergencyContactName}" />
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="emergencyContactPhone">Contact Phone</label>
                <input type="tel" id="emergencyContactPhone" name="emergencyContactPhone"
                       th:value="${tenant.emergencyContactPhone}" />
            </div>

            <div class="form-group">
                <label for="emergencyContactRelationship">Relationship</label>
                <input type="text" id="emergencyContactRelationship" name="emergencyContactRelationship"
                       th:value="${tenant.emergencyContactRelationship}"
                       placeholder="e.g., Mother, Brother, Friend" />
            </div>
        </div>

        <!-- Employment Information Section -->
        <div class="section-title">Employment Information</div>

        <div class="form-row">
            <div class="form-group">
                <label for="occupation">Occupation</label>
                <input type="text" id="occupation" name="occupation"
                       th:value="${tenant.occupation}" />
            </div>

            <div class="form-group">
                <label for="employerName">Employer Name</label>
                <input type="text" id="employerName" name="employerName"
                       th:value="${tenant.employerName}" />
            </div>
        </div>

        <!-- Additional Notes Section -->
        <div class="section-title">Additional Notes</div>

        <div class="form-group">
            <label for="notes">Notes</label>
            <textarea id="notes" name="notes"
                      placeholder="Any additional information about the tenant"
                      th:text="${tenant.notes}"></textarea>
        </div>

        <div class="button-group">
            <button type="submit" class="btn">Save Tenant</button>
            <a href="/tenants" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
</body>
</html>
