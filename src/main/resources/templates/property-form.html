<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Property Form</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background-color: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            color: #333;
            margin-bottom: 30px;
            text-align: center;
            font-size: 32px;
            font-weight: 700;
        }
        .section-title {
            color: #f5576c;
            font-size: 18px;
            margin-top: 30px;
            margin-bottom: 20px;
            padding-bottom: 8px;
            border-bottom: 3px solid #f5576c;
            font-weight: 600;
        }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        .form-row.single {
            grid-template-columns: 1fr;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
            font-size: 14px;
        }
        .required {
            color: #f5576c;
        }
        input, textarea {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        input:focus, textarea:focus {
            outline: none;
            border-color: #f5576c;
            box-shadow: 0 0 0 3px rgba(245, 87, 108, 0.1);
        }
        textarea {
            resize: vertical;
            min-height: 80px;
        }
        .error {
            color: #dc3545;
            font-size: 12px;
            margin-top: 5px;
        }
        .btn {
            display: inline-block;
            padding: 14px 32px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            text-decoration: none;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            margin-right: 10px;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(245, 87, 108, 0.3);
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(245, 87, 108, 0.4);
        }
        .btn-secondary {
            background: linear-gradient(135deg, #6c757d 0%, #495057 100%);
            box-shadow: 0 4px 15px rgba(108, 117, 125, 0.3);
        }
        .btn-secondary:hover {
            box-shadow: 0 6px 20px rgba(108, 117, 125, 0.4);
        }
        .button-group {
            margin-top: 40px;
            text-align: center;
        }
    </style>
</head>
<body>
<div class="container">
    <h1 th:text="${property.propertyId != null ? '✏️ Edit Property' : '➕ Add New Property'}"></h1>

    <form th:action="@{/properties/save}" th:object="${property}" method="post">
        <input type="hidden" th:field="*{propertyId}" />

        <!-- Property Information Section -->
        <div class="section-title">Property Information</div>

        <div class="form-group">
            <label for="propertyName">Property Name <span class="required">*</span></label>
            <input type="text" id="propertyName" th:field="*{propertyName}" required />
            <span class="error" th:if="${#fields.hasErrors('propertyName')}"
                  th:errors="*{propertyName}"></span>
        </div>

        <!-- Address Section -->
        <div class="section-title">Address</div>

        <div class="form-group">
            <label for="streetAddress1">Street Address 1 <span class="required">*</span></label>
            <input type="text" id="streetAddress1" th:field="*{streetAddress1}"
                   placeholder="Street number and name" required />
            <span class="error" th:if="${#fields.hasErrors('streetAddress1')}"
                  th:errors="*{streetAddress1}"></span>
        </div>

        <div class="form-group">
            <label for="streetAddress2">Street Address 2</label>
            <input type="text" id="streetAddress2" th:field="*{streetAddress2}"
                   placeholder="Apartment, suite, unit, etc. (optional)" />
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="city">City <span class="required">*</span></label>
                <input type="text" id="city" th:field="*{city}" required />
                <span class="error" th:if="${#fields.hasErrors('city')}"
                      th:errors="*{city}"></span>
            </div>

            <div class="form-group">
                <label for="state">State <span class="required">*</span></label>
                <input type="text" id="state" th:field="*{state}"
                       placeholder="e.g., MA, CA, NY" required />
                <span class="error" th:if="${#fields.hasErrors('state')}"
                      th:errors="*{state}"></span>
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="zipCode">Zip Code <span class="required">*</span></label>
                <input type="text" id="zipCode" th:field="*{zipCode}"
                       placeholder="e.g., 02130 or 02130-1234" required />
                <span class="error" th:if="${#fields.hasErrors('zipCode')}"
                      th:errors="*{zipCode}"></span>
            </div>

            <div class="form-group">
                <label for="country">Country <span class="required">*</span></label>
                <input type="text" id="country" th:field="*{country}"
                       value="USA" required />
                <span class="error" th:if="${#fields.hasErrors('country')}"
                      th:errors="*{country}"></span>
            </div>
        </div>

        <!-- Owner Information Section -->
        <div class="section-title">Owner Information</div>

        <div class="form-group">
            <label for="ownerName">Owner Name <span class="required">*</span></label>
            <input type="text" id="ownerName" th:field="*{ownerName}" required />
            <span class="error" th:if="${#fields.hasErrors('ownerName')}"
                  th:errors="*{ownerName}"></span>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="ownerPhone">Primary Phone <span class="required">*</span></label>
                <input type="text" id="ownerPhone" th:field="*{ownerPhone}"
                       placeholder="e.g., 6175551234" required />
                <span class="error" th:if="${#fields.hasErrors('ownerPhone')}"
                      th:errors="*{ownerPhone}"></span>
            </div>

            <div class="form-group">
                <label for="ownerPhone2">Secondary Phone</label>
                <input type="text" id="ownerPhone2" th:field="*{ownerPhone2}"
                       placeholder="Optional" />
            </div>
        </div>

        <div class="form-group">
            <label for="ownerEmail">Email <span class="required">*</span></label>
            <input type="email" id="ownerEmail" th:field="*{ownerEmail}"
                   placeholder="owner@example.com" required />
            <span class="error" th:if="${#fields.hasErrors('ownerEmail')}"
                  th:errors="*{ownerEmail}"></span>
        </div>

        <div class="button-group">
            <button type="submit" class="btn">Save Property</button>
            <a href="/properties" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
</body>
</html>
