<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Units Management</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background-color: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            color: #333;
            margin-bottom: 10px;
            text-align: center;
            font-size: 36px;
            font-weight: 700;
        }
        .breadcrumb {
            text-align: center;
            margin-bottom: 30px;
            color: #666;
            font-size: 16px;
        }
        .breadcrumb a {
            color: #00f2fe;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s;
        }
        .breadcrumb a:hover {
            color: #4facfe;
        }
        .filter-section {
            margin-bottom: 30px;
            padding: 20px;
            background: linear-gradient(135deg, #e0f7ff 0%, #f0fbff 100%);
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(79, 172, 254, 0.2);
        }
        .filter-section label {
            font-weight: 600;
            color: #333;
            margin-right: 10px;
        }
        .filter-section select {
            padding: 10px 16px;
            border-radius: 8px;
            border: 2px solid #4facfe;
            margin-right: 10px;
            font-size: 14px;
        }
        .btn {
            display: inline-block;
            padding: 12px 24px;
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
            text-decoration: none;
            border-radius: 25px;
            font-weight: 600;
            transition: all 0.3s;
            border: none;
            cursor: pointer;
            font-size: 14px;
            box-shadow: 0 4px 15px rgba(79, 172, 254, 0.3);
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(79, 172, 254, 0.4);
        }
        .btn-danger {
            background: linear-gradient(135deg, #f85032 0%, #e73827 100%);
            box-shadow: 0 4px 15px rgba(220, 53, 69, 0.3);
            padding: 8px 15px;
            font-size: 14px;
        }
        .btn-danger:hover {
            box-shadow: 0 6px 20px rgba(220, 53, 69, 0.4);
        }
        .btn-warning {
            background: linear-gradient(135deg, #ffd89b 0%, #19547b 100%);
            box-shadow: 0 4px 15px rgba(255, 193, 7, 0.3);
            padding: 8px 15px;
            font-size: 14px;
        }
        .btn-warning:hover {
            box-shadow: 0 6px 20px rgba(255, 193, 7, 0.4);
        }
        .btn-secondary {
            background: linear-gradient(135deg, #6c757d 0%, #495057 100%);
            box-shadow: 0 4px 15px rgba(108, 117, 125, 0.3);
        }
        .btn-secondary:hover {
            box-shadow: 0 6px 20px rgba(108, 117, 125, 0.4);
        }
        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            margin-top: 20px;
            overflow: hidden;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
        }
        th, td {
            padding: 16px;
            text-align: left;
        }
        th {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 12px;
            letter-spacing: 1px;
        }
        tbody tr {
            background-color: white;
            transition: all 0.3s;
        }
        tbody tr:hover {
            background-color: #f8f9fa;
            transform: scale(1.01);
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        td {
            border-bottom: 1px solid #e9ecef;
        }
        .actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .no-data {
            text-align: center;
            padding: 60px 20px;
            color: #999;
            font-size: 18px;
        }
        .no-data::before {
            content: "🏠";
            display: block;
            font-size: 64px;
            margin-bottom: 20px;
        }
        .status-badge {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
        }
        .status-available {
            background-color: #d4edda;
            color: #155724;
        }
        .status-occupied {
            background-color: #f8d7da;
            color: #721c24;
        }
        .status-maintenance {
            background-color: #fff3cd;
            color: #856404;
        }
        .status-unavailable {
            background-color: #d6d8db;
            color: #383d41;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>🏠 Units Management</h1>

    <div class="breadcrumb">
        <a href="/">🏠 Home</a> /
        <a href="/properties">Properties</a> /
        <span th:if="${selectedProperty != null}" th:text="${selectedProperty.propertyName}"></span>
        <span th:if="${selectedProperty == null}">All Units</span>
    </div>

    <div class="filter-section">
        <label>Filter by Property:</label>
        <select onchange="window.location.href='/units?propertyId=' + this.value">
            <option value="">All Properties</option>
            <option th:each="prop : ${properties}"
                    th:value="${prop.propertyId}"
                    th:text="${prop.propertyName}"
                    th:selected="${selectedProperty != null && selectedProperty.propertyId == prop.propertyId}">
            </option>
        </select>
        <a href="/units" class="btn btn-secondary">Clear Filter</a>
    </div>

    <a th:href="@{/units/new(propertyId=${selectedProperty != null ? selectedProperty.propertyId : null})}"
       class="btn">+ Add New Unit</a>

    <div th:if="${units.isEmpty()}" class="no-data">
        <p>No units found. Click "Add New Unit" to create one.</p>
    </div>

    <table th:if="${!units.isEmpty()}">
        <thead>
        <tr>
            <th>ID</th>
            <th>Unit Number</th>
            <th>Property</th>
            <th>Beds/Baths</th>
            <th>Square Ft</th>
            <th>Monthly Rent</th>
            <th>Status</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="unit : ${units}">
            <td th:text="${unit.unitId}"></td>
            <td th:text="${unit.unitNumber}" style="font-weight: 600; color: #333;"></td>
            <td th:text="${unit.property.propertyName}"></td>
            <td>
                <span th:text="${unit.bedrooms} + ' BR / ' + ${unit.bathrooms} + ' BA'"></span>
            </td>
            <td th:text="${unit.squareFootage} + ' sq ft'"></td>
            <td th:text="'$' + ${#numbers.formatDecimal(unit.monthlyRent, 1, 2)}"
                style="font-weight: 600; color: #28a745;"></td>
            <td th:switch="${unit.unitStatus.name()}">
                <span th:case="'AVAILABLE'" class="status-badge status-available" th:text="${unit.unitStatus}"></span>
                <span th:case="'OCCUPIED'" class="status-badge status-occupied" th:text="${unit.unitStatus}"></span>
                <span th:case="'MAINTENANCE'" class="status-badge status-maintenance" th:text="${unit.unitStatus}"></span>
                <span th:case="'UNAVAILABLE'" class="status-badge status-unavailable" th:text="${unit.unitStatus}"></span>
            </td>
            <td class="actions">
                <a th:href="@{/units/edit/{id}(id=${unit.unitId})}"
                   class="btn btn-warning">Edit</a>
                <a th:href="@{/units/delete/{id}(id=${unit.unitId})}"
                   class="btn btn-danger"
                   onclick="return confirm('Are you sure you want to delete this unit?')">Delete</a>
            </td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
