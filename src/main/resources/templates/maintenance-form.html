<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maintenance Request Form</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #ff9a56 0%, #ff6a88 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background-color: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            color: #333;
            margin-bottom: 30px;
            text-align: center;
            font-size: 32px;
            font-weight: 700;
        }
        .section-title {
            color: #ff6a88;
            font-size: 18px;
            margin-top: 30px;
            margin-bottom: 20px;
            padding-bottom: 8px;
            border-bottom: 3px solid #ff6a88;
            font-weight: 600;
        }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
            font-size: 14px;
        }
        .required {
            color: #ff6a88;
        }
        input, textarea, select {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: #ff6a88;
            box-shadow: 0 0 0 3px rgba(255, 106, 136, 0.1);
        }
        textarea {
            resize: vertical;
            min-height: 100px;
        }
        .btn {
            display: inline-block;
            padding: 14px 32px;
            background: linear-gradient(135deg, #ff9a56 0%, #ff6a88 100%);
            color: white;
            text-decoration: none;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            margin-right: 10px;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(255, 106, 136, 0.3);
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 106, 136, 0.4);
        }
        .btn-secondary {
            background: linear-gradient(135deg, #6c757d 0%, #495057 100%);
            box-shadow: 0 4px 15px rgba(108, 117, 125, 0.3);
        }
        .btn-secondary:hover {
            box-shadow: 0 6px 20px rgba(108, 117, 125, 0.4);
        }
        .button-group {
            margin-top: 40px;
            text-align: center;
        }
        .helper-text {
            font-size: 12px;
            color: #666;
            margin-top: 3px;
        }
    </style>
</head>
<body>
<div class="container">
    <h1 th:text="${request.requestId != null ? '✏️ Edit Maintenance Request' : '🔧 New Maintenance Request'}"></h1>

    <form th:action="@{/maintenance/save}" method="post">
        <input type="hidden" name="requestId" th:value="${request.requestId}" />

        <!-- Unit Selection -->
        <div class="section-title">Location</div>

        <div class="form-group">
            <label for="unitId">Unit <span class="required">*</span></label>
            <select id="unitId" name="unitId" required>
                <option value="">-- Select Unit --</option>
                <option th:each="unit : ${units}"
                        th:value="${unit.unitId}"
                        th:text="${unit.property.propertyName + ' - Unit ' + unit.unitNumber}"
                        th:selected="${request.unit != null && request.unit.unitId == unit.unitId}">
                </option>
            </select>
        </div>

        <!-- Request Details -->
        <div class="section-title">Request Details</div>

        <div class="form-group">
            <label for="title">Issue Title <span class="required">*</span></label>
            <input type="text" id="title" name="title"
                   th:value="${request.title}"
                   placeholder="e.g., Leaking faucet, Broken AC, etc."
                   required />
        </div>

        <div class="form-group">
            <label for="description">Description <span class="required">*</span></label>
            <textarea id="description" name="description"
                      placeholder="Detailed description of the maintenance issue"
                      th:text="${request.description}"
                      required></textarea>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="priority">Priority <span class="required">*</span></label>
                <select id="priority" name="priority" required>
                    <option value="">-- Select Priority --</option>
                    <option th:each="pri : ${priorities}"
                            th:value="${pri}"
                            th:text="${pri}"
                            th:selected="${request.priority != null && request.priority == pri}">
                    </option>
                </select>
            </div>

            <div class="form-group">
                <label for="status">Status <span class="required">*</span></label>
                <select id="status" name="status" required>
                    <option value="">-- Select Status --</option>
                    <option th:each="stat : ${statuses}"
                            th:value="${stat}"
                            th:text="${stat}"
                            th:selected="${request.status != null && request.status == stat}">
                    </option>
                </select>
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="requestDate">Request Date <span class="required">*</span></label>
                <input type="date" id="requestDate" name="requestDate"
                       th:value="${request.requestDate != null ? #dates.format(request.requestDate, 'yyyy-MM-dd') : ''}"
                       required />
            </div>

            <div class="form-group">
                <label for="completedDate">Completed Date</label>
                <input type="date" id="completedDate" name="completedDate"
                       th:value="${request.completedDate != null ? #dates.format(request.completedDate, 'yyyy-MM-dd') : ''}" />
                <span class="helper-text">Leave empty if not completed</span>
            </div>
        </div>

        <!-- Assignment and Costs -->
        <div class="section-title">Assignment & Costs</div>

        <div class="form-group">
            <label for="assignedTo">Assigned To</label>
            <input type="text" id="assignedTo" name="assignedTo"
                   th:value="${request.assignedTo}"
                   placeholder="Technician or company name" />
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="estimatedCost">Estimated Cost ($)</label>
                <input type="number" id="estimatedCost" name="estimatedCost"
                       th:value="${request.estimatedCost}"
                       min="0" step="0.01"
                       placeholder="0.00" />
            </div>

            <div class="form-group">
                <label for="actualCost">Actual Cost ($)</label>
                <input type="number" id="actualCost" name="actualCost"
                       th:value="${request.actualCost}"
                       min="0" step="0.01"
                       placeholder="0.00" />
            </div>
        </div>

        <!-- Additional Notes -->
        <div class="section-title">Additional Notes</div>

        <div class="form-group">
            <label for="notes">Notes</label>
            <textarea id="notes" name="notes"
                      placeholder="Any additional information, parts needed, follow-up required, etc."
                      th:text="${request.notes}"></textarea>
        </div>

        <div class="button-group">
            <button type="submit" class="btn">Save Request</button>
            <a href="/maintenance" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
</body>
</html>
