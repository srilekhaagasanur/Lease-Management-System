<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payments Management</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background-color: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            color: #333;
            margin-bottom: 10px;
            text-align: center;
            font-size: 36px;
            font-weight: 700;
        }
        .breadcrumb {
            text-align: center;
            margin-bottom: 30px;
            color: #666;
            font-size: 16px;
        }
        .breadcrumb a {
            color: #ff6b9d;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s;
        }
        .breadcrumb a:hover {
            color: #c44569;
        }
        .filter-section {
            margin-bottom: 30px;
            padding: 20px;
            background: linear-gradient(135deg, #ffeaa7 0%, #fdcb6e 100%);
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(253, 203, 110, 0.3);
            display: flex;
            gap: 15px;
            align-items: center;
            flex-wrap: wrap;
        }
        .filter-section label {
            font-weight: 600;
            color: #333;
        }
        .filter-section select {
            padding: 10px 16px;
            border-radius: 8px;
            border: 2px solid #fdcb6e;
            font-size: 14px;
        }
        .btn {
            display: inline-block;
            padding: 12px 24px;
            background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
            color: #333;
            text-decoration: none;
            border-radius: 25px;
            font-weight: 600;
            transition: all 0.3s;
            border: none;
            cursor: pointer;
            font-size: 14px;
            box-shadow: 0 4px 15px rgba(168, 237, 234, 0.3);
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(168, 237, 234, 0.4);
        }
        .btn-danger {
            background: linear-gradient(135deg, #f85032 0%, #e73827 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(220, 53, 69, 0.3);
        }
        .btn-danger:hover {
            box-shadow: 0 6px 20px rgba(220, 53, 69, 0.4);
        }
        .btn-warning {
            background: linear-gradient(135deg, #ffd89b 0%, #19547b 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(255, 193, 7, 0.3);
        }
        .btn-warning:hover {
            box-shadow: 0 6px 20px rgba(255, 193, 7, 0.4);
        }
        .btn-secondary {
            background: linear-gradient(135deg, #6c757d 0%, #495057 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(108, 117, 125, 0.3);
        }
        .btn-secondary:hover {
            box-shadow: 0 6px 20px rgba(108, 117, 125, 0.4);
        }
        .btn-success {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(56, 239, 125, 0.3);
        }
        .btn-success:hover {
            box-shadow: 0 6px 20px rgba(56, 239, 125, 0.4);
        }
        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            margin-top: 20px;
            overflow: hidden;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
        }
        th, td {
            padding: 16px;
            text-align: left;
        }
        th {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 12px;
            letter-spacing: 1px;
        }
        tbody tr {
            background-color: white;
            transition: all 0.3s;
        }
        tbody tr:hover {
            background-color: #f8f9fa;
            transform: scale(1.01);
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        td {
            border-bottom: 1px solid #e9ecef;
        }
        .actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .no-data {
            text-align: center;
            padding: 60px 20px;
            color: #999;
            font-size: 18px;
        }
        .no-data::before {
            content: "💰";
            display: block;
            font-size: 64px;
            margin-bottom: 20px;
        }
        .status-badge {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
        }
        .status-paid {
            background-color: #d4edda;
            color: #155724;
        }
        .status-pending {
            background-color: #fff3cd;
            color: #856404;
        }
        .status-late {
            background-color: #f8d7da;
            color: #721c24;
        }
        .status-partial {
            background-color: #d1ecf1;
            color: #0c5460;
        }
        .status-refunded {
            background-color: #d6d8db;
            color: #383d41;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>💰 Payments Management</h1>

    <div class="breadcrumb">
        <a href="/">🏠 Home</a> /
        <span>Payments</span>
    </div>

    <div class="filter-section">
        <label>Filter by Status:</label>
        <select onchange="window.location.href='/payments?status=' + this.value">
            <option value="">All Statuses</option>
            <option th:each="stat : ${statuses}"
                    th:value="${stat}"
                    th:text="${stat}"
                    th:selected="${selectedStatus != null && selectedStatus == stat.name()}">
            </option>
        </select>
        <a href="/payments" class="btn btn-secondary">Clear Filter</a>
        <a href="/payments/overdue" class="btn btn-danger" style="margin-left: auto;">⚠️ View Overdue</a>
    </div>

    <a href="/payments/new" class="btn btn-success">+ Record New Payment</a>

    <div th:if="${payments.isEmpty()}" class="no-data">
        <p th:text="${overdueView != null ? 'No overdue payments found!' : 'No payments recorded. Click Record New Payment to add one.'}"></p>
    </div>

    <table th:if="${!payments.isEmpty()}">
        <thead>
        <tr>
            <th>ID</th>
            <th>Tenant</th>
            <th>Unit</th>
            <th>Due Date</th>
            <th>Payment Date</th>
            <th>Amount</th>
            <th>Method</th>
            <th>Status</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="payment : ${payments}">
            <td th:text="${payment.paymentId}"></td>
            <td th:text="${payment.tenantName}" style="font-weight: 600;"></td>
            <td th:text="${payment.unitInfo}"></td>
            <td th:text="${#dates.format(payment.dueDate, 'MM/dd/yyyy')}"></td>
            <td th:text="${#dates.format(payment.paymentDate, 'MM/dd/yyyy')}"></td>
            <td th:text="'$' + ${#numbers.formatDecimal(payment.amountPaid, 1, 2)}"
                style="font-weight: 600; color: #28a745;"></td>
            <td th:text="${payment.paymentMethod}"></td>
            <td th:switch="${payment.paymentStatus.name()}">
                <span th:case="'PAID'" class="status-badge status-paid" th:text="${payment.paymentStatus}"></span>
                <span th:case="'PENDING'" class="status-badge status-pending" th:text="${payment.paymentStatus}"></span>
                <span th:case="'LATE'" class="status-badge status-late" th:text="${payment.paymentStatus}"></span>
                <span th:case="'PARTIAL'" class="status-badge status-partial" th:text="${payment.paymentStatus}"></span>
                <span th:case="'REFUNDED'" class="status-badge status-refunded" th:text="${payment.paymentStatus}"></span>
            </td>
            <td class="actions">
                <a th:href="@{/payments/edit/{id}(id=${payment.paymentId})}"
                   class="btn btn-warning">Edit</a>
                <a th:href="@{/payments/delete/{id}(id=${payment.paymentId})}"
                   class="btn btn-danger"
                   onclick="return confirm('Are you sure you want to delete this payment record?')">Delete</a>
            </td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
