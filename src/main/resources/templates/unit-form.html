<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unit Form</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background-color: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            color: #333;
            margin-bottom: 30px;
            text-align: center;
            font-size: 32px;
            font-weight: 700;
        }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
            font-size: 14px;
        }
        .required {
            color: #00f2fe;
        }
        input, textarea, select {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: #4facfe;
            box-shadow: 0 0 0 3px rgba(79, 172, 254, 0.1);
        }
        textarea {
            resize: vertical;
            min-height: 80px;
        }
        .btn {
            display: inline-block;
            padding: 14px 32px;
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
            text-decoration: none;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            margin-right: 10px;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(79, 172, 254, 0.3);
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(79, 172, 254, 0.4);
        }
        .btn-secondary {
            background: linear-gradient(135deg, #6c757d 0%, #495057 100%);
            box-shadow: 0 4px 15px rgba(108, 117, 125, 0.3);
        }
        .btn-secondary:hover {
            box-shadow: 0 6px 20px rgba(108, 117, 125, 0.4);
        }
        .button-group {
            margin-top: 40px;
            text-align: center;
        }
        .helper-text {
            font-size: 12px;
            color: #666;
            margin-top: 3px;
        }
    </style>
</head>
<body>
<div class="container">
    <h1 th:text="${unit.unitId != null ? '✏️ Edit Unit' : '➕ Add New Unit'}"></h1>

    <form th:action="@{/units/save}" method="post">
        <input type="hidden" name="unitId" th:value="${unit.unitId}" />

        <div class="form-group">
            <label for="propertyIdSelect">Property <span class="required">*</span></label>
            <select id="propertyIdSelect" name="propertyId" required>
                <option value="">-- Select Property --</option>
                <option th:each="prop : ${properties}"
                        th:value="${prop.propertyId}"
                        th:text="${prop.propertyName}"
                        th:selected="${unit.property != null && unit.property.propertyId == prop.propertyId}">
                </option>
            </select>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="unitNumber">Unit Number <span class="required">*</span></label>
                <input type="text" id="unitNumber" name="unitNumber"
                       th:value="${unit.unitNumber}"
                       placeholder="e.g., 101, A1, etc." required />
            </div>

            <div class="form-group">
                <label for="unitStatus">Status <span class="required">*</span></label>
                <select id="unitStatus" name="unitStatus" required>
                    <option value="">-- Select Status --</option>
                    <option th:each="status : ${statuses}"
                            th:value="${status}"
                            th:text="${status}"
                            th:selected="${unit.unitStatus != null && unit.unitStatus == status}">
                    </option>
                </select>
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="bedrooms">Bedrooms <span class="required">*</span></label>
                <input type="number" id="bedrooms" name="bedrooms"
                       th:value="${unit.bedrooms}"
                       min="0" required />
            </div>

            <div class="form-group">
                <label for="bathrooms">Bathrooms <span class="required">*</span></label>
                <input type="number" id="bathrooms" name="bathrooms"
                       th:value="${unit.bathrooms}"
                       min="0" step="0.5" required />
                <span class="helper-text">Use 0.5 for half bath</span>
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="squareFootage">Square Footage <span class="required">*</span></label>
                <input type="number" id="squareFootage" name="squareFootage"
                       th:value="${unit.squareFootage}"
                       min="1" step="0.01" required />
            </div>

            <div class="form-group">
                <label for="monthlyRent">Monthly Rent ($) <span class="required">*</span></label>
                <input type="number" id="monthlyRent" name="monthlyRent"
                       th:value="${unit.monthlyRent}"
                       min="0" step="0.01" required />
            </div>
        </div>

        <div class="form-group">
            <label for="description">Description</label>
            <textarea id="description" name="description"
                      placeholder="Additional details about the unit (optional)"
                      th:text="${unit.description}"></textarea>
        </div>

        <div class="button-group">
            <button type="submit" class="btn">Save Unit</button>
            <a href="/units" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
</body>
</html>
