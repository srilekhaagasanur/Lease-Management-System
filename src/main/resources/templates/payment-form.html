<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Form</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background-color: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            color: #333;
            margin-bottom: 30px;
            text-align: center;
            font-size: 32px;
            font-weight: 700;
        }
        .section-title {
            color: #ff6b9d;
            font-size: 18px;
            margin-top: 30px;
            margin-bottom: 20px;
            padding-bottom: 8px;
            border-bottom: 3px solid #ff6b9d;
            font-weight: 600;
        }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
            font-size: 14px;
        }
        .required {
            color: #ff6b9d;
        }
        input, textarea, select {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: #ff6b9d;
            box-shadow: 0 0 0 3px rgba(255, 107, 157, 0.1);
        }
        textarea {
            resize: vertical;
            min-height: 80px;
        }
        .btn {
            display: inline-block;
            padding: 14px 32px;
            background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
            color: #333;
            text-decoration: none;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            margin-right: 10px;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(168, 237, 234, 0.3);
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(168, 237, 234, 0.4);
        }
        .btn-secondary {
            background: linear-gradient(135deg, #6c757d 0%, #495057 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(108, 117, 125, 0.3);
        }
        .btn-secondary:hover {
            box-shadow: 0 6px 20px rgba(108, 117, 125, 0.4);
        }
        .button-group {
            margin-top: 40px;
            text-align: center;
        }
        .helper-text {
            font-size: 12px;
            color: #666;
            margin-top: 3px;
        }
    </style>
</head>
<body>
<div class="container">
    <h1 th:text="${payment.paymentId != null ? '✏️ Edit Payment' : '💰 Record New Payment'}"></h1>

    <form th:action="@{/payments/save}" method="post">
        <input type="hidden" name="paymentId" th:value="${payment.paymentId}" />

        <!-- Lease Selection -->
        <div class="section-title">Lease Information</div>

        <div class="form-group">
            <label for="leaseId">Lease <span class="required">*</span></label>
            <select id="leaseId" name="leaseId" required>
                <option value="">-- Select Lease --</option>
                <option th:each="lease : ${leases}"
                        th:value="${lease.leaseId}"
                        th:text="${lease.tenantName + ' - ' + lease.propertyName + ' Unit ' + lease.unitNumber + ' ($' + lease.monthlyRent + '/mo)'}"
                        th:selected="${payment.lease != null && payment.lease.leaseId == lease.leaseId}">
                </option>
            </select>
        </div>

        <!-- Payment Details -->
        <div class="section-title">Payment Details</div>

        <div class="form-row">
            <div class="form-group">
                <label for="dueDate">Due Date <span class="required">*</span></label>
                <input type="date" id="dueDate" name="dueDate"
                       th:value="${payment.dueDate != null ? #dates.format(payment.dueDate, 'yyyy-MM-dd') : ''}"
                       required />
            </div>

            <div class="form-group">
                <label for="paymentDate">Payment Date <span class="required">*</span></label>
                <input type="date" id="paymentDate" name="paymentDate"
                       th:value="${payment.paymentDate != null ? #dates.format(payment.paymentDate, 'yyyy-MM-dd') : ''}"
                       required />
                <span class="helper-text">Date when payment was actually received</span>
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="amountPaid">Amount Paid ($) <span class="required">*</span></label>
                <input type="number" id="amountPaid" name="amountPaid"
                       th:value="${payment.amountPaid}"
                       min="0" step="0.01" required />
            </div>

            <div class="form-group">
                <label for="paymentMethod">Payment Method <span class="required">*</span></label>
                <select id="paymentMethod" name="paymentMethod" required>
                    <option value="">-- Select Method --</option>
                    <option th:each="method : ${paymentMethods}"
                            th:value="${method}"
                            th:text="${method}"
                            th:selected="${payment.paymentMethod != null && payment.paymentMethod == method}">
                    </option>
                </select>
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="paymentStatus">Payment Status <span class="required">*</span></label>
                <select id="paymentStatus" name="paymentStatus" required>
                    <option value="">-- Select Status --</option>
                    <option th:each="status : ${paymentStatuses}"
                            th:value="${status}"
                            th:text="${status}"
                            th:selected="${payment.paymentStatus != null && payment.paymentStatus == status}">
                    </option>
                </select>
            </div>

            <div class="form-group">
                <label for="transactionReference">Transaction Reference</label>
                <input type="text" id="transactionReference" name="transactionReference"
                       th:value="${payment.transactionReference}"
                       placeholder="e.g., Check #1234, Receipt #5678" />
            </div>
        </div>

        <!-- Additional Information -->
        <div class="section-title">Additional Information</div>

        <div class="form-group">
            <label for="notes">Notes</label>
            <textarea id="notes" name="notes"
                      placeholder="Additional payment notes or details"
                      th:text="${payment.notes}"></textarea>
        </div>

        <div class="button-group">
            <button type="submit" class="btn">Save Payment</button>
            <a href="/payments" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
</body>
</html>
