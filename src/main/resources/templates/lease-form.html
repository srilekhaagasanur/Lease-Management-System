<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lease Form</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background-color: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            color: #333;
            margin-bottom: 30px;
            text-align: center;
            font-size: 32px;
            font-weight: 700;
        }
        .section-title {
            color: #fa709a;
            font-size: 18px;
            margin-top: 30px;
            margin-bottom: 20px;
            padding-bottom: 8px;
            border-bottom: 3px solid #fa709a;
            font-weight: 600;
        }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
            font-size: 14px;
        }
        .required {
            color: #fa709a;
        }
        input, textarea, select {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: #fa709a;
            box-shadow: 0 0 0 3px rgba(250, 112, 154, 0.1);
        }
        textarea {
            resize: vertical;
            min-height: 80px;
        }
        .btn {
            display: inline-block;
            padding: 14px 32px;
            background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
            color: white;
            text-decoration: none;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            margin-right: 10px;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(250, 112, 154, 0.3);
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(250, 112, 154, 0.4);
        }
        .btn-secondary {
            background: linear-gradient(135deg, #6c757d 0%, #495057 100%);
            box-shadow: 0 4px 15px rgba(108, 117, 125, 0.3);
        }
        .btn-secondary:hover {
            box-shadow: 0 6px 20px rgba(108, 117, 125, 0.4);
        }
        .button-group {
            margin-top: 40px;
            text-align: center;
        }
        .helper-text {
            font-size: 12px;
            color: #666;
            margin-top: 3px;
        }
    </style>
</head>
<body>
<div class="container">
    <h1 th:text="${lease.leaseId != null ? '✏️ Edit Lease' : '➕ Add New Lease'}"></h1>

    <form th:action="@{/leases/save}" method="post">
        <input type="hidden" name="leaseId" th:value="${lease.leaseId}" />

        <!-- Unit and Tenant Selection -->
        <div class="section-title">Lease Details</div>

        <div class="form-row">
            <div class="form-group">
                <label for="unitId">Unit <span class="required">*</span></label>
                <select id="unitId" name="unitId" required>
                    <option value="">-- Select Unit --</option>
                    <option th:each="unit : ${units}"
                            th:value="${unit.unitId}"
                            th:text="${unit.property.propertyName + ' - Unit ' + unit.unitNumber + ' (' + unit.bedrooms + 'BR/' + unit.bathrooms + 'BA)'}"
                            th:selected="${lease.unit != null && lease.unit.unitId == unit.unitId}">
                    </option>
                </select>
            </div>

            <div class="form-group">
                <label for="tenantId">Tenant <span class="required">*</span></label>
                <select id="tenantId" name="tenantId" required>
                    <option value="">-- Select Tenant --</option>
                    <option th:each="tenant : ${tenants}"
                            th:value="${tenant.tenantId}"
                            th:text="${tenant.fullName + ' (' + tenant.email + ')'}"
                            th:selected="${lease.tenant != null && lease.tenant.tenantId == tenant.tenantId}">
                    </option>
                </select>
            </div>
        </div>

        <!-- Dates -->
        <div class="section-title">Lease Period</div>

        <div class="form-row">
            <div class="form-group">
                <label for="startDate">Start Date <span class="required">*</span></label>
                <input type="date" id="startDate" name="startDate"
                       th:value="${lease.startDate != null ? #dates.format(lease.startDate, 'yyyy-MM-dd') : ''}"
                       required />
            </div>

            <div class="form-group">
                <label for="endDate">End Date <span class="required">*</span></label>
                <input type="date" id="endDate" name="endDate"
                       th:value="${lease.endDate != null ? #dates.format(lease.endDate, 'yyyy-MM-dd') : ''}"
                       required />
            </div>
        </div>

        <!-- Financial Details -->
        <div class="section-title">Financial Information</div>

        <div class="form-row">
            <div class="form-group">
                <label for="monthlyRent">Monthly Rent ($) <span class="required">*</span></label>
                <input type="number" id="monthlyRent" name="monthlyRent"
                       th:value="${lease.monthlyRent}"
                       min="0" step="0.01" required />
            </div>

            <div class="form-group">
                <label for="securityDeposit">Security Deposit ($) <span class="required">*</span></label>
                <input type="number" id="securityDeposit" name="securityDeposit"
                       th:value="${lease.securityDeposit}"
                       min="0" step="0.01" required />
            </div>
        </div>

        <!-- Status -->
        <div class="form-group">
            <label for="leaseStatus">Lease Status <span class="required">*</span></label>
            <select id="leaseStatus" name="leaseStatus" required>
                <option value="">-- Select Status --</option>
                <option th:each="status : ${statuses}"
                        th:value="${status}"
                        th:text="${status}"
                        th:selected="${lease.leaseStatus != null && lease.leaseStatus == status}">
                </option>
            </select>
        </div>

        <!-- Notes -->
        <div class="section-title">Additional Information</div>

        <div class="form-group">
            <label for="notes">Notes</label>
            <textarea id="notes" name="notes"
                      placeholder="Additional lease terms, conditions, or notes"
                      th:text="${lease.notes}"></textarea>
        </div>

        <div class="button-group">
            <button type="submit" class="btn">Save Lease</button>
            <a href="/leases" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
</body>
</html>
