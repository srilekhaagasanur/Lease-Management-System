<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Property Management - Properties</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background-color: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            color: #333;
            margin-bottom: 10px;
            text-align: center;
            font-size: 36px;
            font-weight: 700;
        }
        .breadcrumb {
            text-align: center;
            margin-bottom: 30px;
            color: #666;
            font-size: 16px;
        }
        .breadcrumb a {
            color: #f5576c;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s;
        }
        .breadcrumb a:hover {
            color: #f093fb;
        }
        .btn {
            display: inline-block;
            padding: 12px 24px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            text-decoration: none;
            border-radius: 25px;
            margin-bottom: 30px;
            font-weight: 600;
            transition: all 0.3s;
            border: none;
            cursor: pointer;
            font-size: 14px;
            box-shadow: 0 4px 15px rgba(245, 87, 108, 0.3);
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(245, 87, 108, 0.4);
        }
        .btn-info {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            box-shadow: 0 4px 15px rgba(79, 172, 254, 0.3);
            padding: 8px 15px;
            font-size: 14px;
        }
        .btn-info:hover {
            box-shadow: 0 6px 20px rgba(79, 172, 254, 0.4);
        }
        .btn-warning {
            background: linear-gradient(135deg, #ffd89b 0%, #19547b 100%);
            box-shadow: 0 4px 15px rgba(255, 193, 7, 0.3);
            padding: 8px 15px;
            font-size: 14px;
        }
        .btn-warning:hover {
            box-shadow: 0 6px 20px rgba(255, 193, 7, 0.4);
        }
        .btn-danger {
            background: linear-gradient(135deg, #f85032 0%, #e73827 100%);
            box-shadow: 0 4px 15px rgba(220, 53, 69, 0.3);
            padding: 8px 15px;
            font-size: 14px;
        }
        .btn-danger:hover {
            box-shadow: 0 6px 20px rgba(220, 53, 69, 0.4);
        }
        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            margin-top: 20px;
            overflow: hidden;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
        }
        th, td {
            padding: 16px;
            text-align: left;
        }
        th {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 12px;
            letter-spacing: 1px;
        }
        tbody tr {
            background-color: white;
            transition: all 0.3s;
        }
        tbody tr:hover {
            background-color: #f8f9fa;
            transform: scale(1.01);
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        td {
            border-bottom: 1px solid #e9ecef;
        }
        .actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .no-data {
            text-align: center;
            padding: 60px 20px;
            color: #999;
            font-size: 18px;
        }
        .no-data::before {
            content: "🏘️";
            display: block;
            font-size: 64px;
            margin-bottom: 20px;
        }
        .address-cell {
            font-size: 14px;
            line-height: 1.6;
            color: #555;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>🏘️ Property Management</h1>

    <div class="breadcrumb">
        <a href="/">🏠 Home</a> /
        <span>Properties</span>
    </div>

    <a href="/properties/new" class="btn">+ Add New Property</a>

    <div th:if="${properties.isEmpty()}" class="no-data">
        <p>No properties found. Click "Add New Property" to create one.</p>
    </div>

    <table th:if="${!properties.isEmpty()}">
        <thead>
        <tr>
            <th>ID</th>
            <th>Property Name</th>
            <th>Address</th>
            <th>Owner Name</th>
            <th>Primary Phone</th>
            <th>Email</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="property : ${properties}">
            <td th:text="${property.propertyId}"></td>
            <td th:text="${property.propertyName}" style="font-weight: 600; color: #333;"></td>
            <td class="address-cell">
                <div th:text="${property.streetAddress1}"></div>
                <div th:if="${property.streetAddress2 != null && !property.streetAddress2.isEmpty()}"
                     th:text="${property.streetAddress2}"></div>
                <div>
                    <span th:text="${property.city}"></span>,
                    <span th:text="${property.state}"></span>
                    <span th:text="${property.zipCode}"></span>
                </div>
                <div th:text="${property.country}"></div>
            </td>
            <td th:text="${property.ownerName}"></td>
            <td>
                <div th:text="${property.ownerPhone}"></div>
                <div th:if="${property.ownerPhone2 != null && !property.ownerPhone2.isEmpty()}"
                     th:text="'Alt: ' + ${property.ownerPhone2}"
                     style="font-size: 12px; color: #666;"></div>
            </td>
            <td th:text="${property.ownerEmail}"></td>
            <td class="actions">
                <a th:href="@{/units(propertyId=${property.propertyId})}"
                   class="btn btn-info">View Units</a>
                <a th:href="@{/properties/edit/{id}(id=${property.propertyId})}"
                   class="btn btn-warning">Edit</a>
                <a th:href="@{/properties/delete/{id}(id=${property.propertyId})}"
                   class="btn btn-danger"
                   onclick="return confirm('Are you sure you want to delete this property?')">Delete</a>
            </td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
